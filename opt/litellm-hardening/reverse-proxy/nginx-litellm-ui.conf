upstream litellm_api {
    server __UPSTREAM_HOST__:__UPSTREAM_PORT__;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name __SERVER_NAME__;

    ssl_certificate __TLS_CERT_FILE__;
    ssl_certificate_key __TLS_KEY_FILE__;
    ssl_session_timeout 1d;
    ssl_session_cache shared:LiteLLMTLS:10m;
    ssl_session_tickets off;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    allow 127.0.0.1;
    allow ::1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow fc00::/7;
    deny all;

    location = /health {
        proxy_pass http://litellm_api/health;
    }

    location /v1/ {
        proxy_pass http://litellm_api;
    }

    location /ui/ {
        proxy_pass http://litellm_api/ui/;
    }

    location / {
        return 404;
    }
}
